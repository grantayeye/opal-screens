<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Opal Screens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #f0f0f5;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 520px;
    }
    .checkmark {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: rgba(0, 194, 255, 0.08);
      border: 2px solid rgba(0, 194, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      animation: pulse 2s ease-in-out infinite;
    }
    .checkmark svg {
      width: 40px;
      height: 40px;
      stroke: #00c2ff;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0, 194, 255, 0.15); }
      50% { box-shadow: 0 0 0 20px rgba(0, 194, 255, 0); }
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }
    h1 span {
      background: linear-gradient(135deg, #fff 0%, #00c2ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: rgba(255,255,255,0.55);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    a {
      display: inline-block;
      padding: 0.85rem 2.2rem;
      background: linear-gradient(135deg, #00c2ff, #0088cc);
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(0, 194, 255, 0.2);
    }
    a:hover { 
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(0, 194, 255, 0.3);
    }
    .logo {
      margin-top: 3rem;
      opacity: 0.3;
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="checkmark">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Thank <span>You</span></h1>
    <p>We've received your message and our team will be in touch shortly. We look forward to helping bring your vision to life.</p>
    <a href="https://opalscreens.com">Back to Opal Screens</a>
    <div class="logo">Opal Screens</div>
  </div>
</body>
</html>
